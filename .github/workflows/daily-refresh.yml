name: "Refresh Power BI Data"

# Se ejecuta diario a las 10:00 AM y 3:00 PM Colombia (15:00 y 20:00 UTC).
# Tambien se puede ejecutar manualmente desde GitHub.
on:
  schedule:
    - cron: "0 15 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-powerbi-data
  cancel-in-progress: false

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate required secrets
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_USERNAME: ${{ secrets.API_USERNAME }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SHAREPOINT_FOLDER_URL: ${{ secrets.SHAREPOINT_FOLDER_URL }}
          SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
          SHAREPOINT_SITE_ID: ${{ secrets.SHAREPOINT_SITE_ID }}
          SHAREPOINT_SITE: ${{ secrets.SHAREPOINT_SITE }}
          SHAREPOINT_DRIVE_ID: ${{ secrets.SHAREPOINT_DRIVE_ID }}
        run: |
          missing=0
          for name in API_BASE_URL API_USERNAME API_PASSWORD AZURE_TENANT_ID AZURE_CLIENT_ID AZURE_CLIENT_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing secret::$name is not configured"
              missing=1
            fi
          done

          if [ -z "${SHAREPOINT_FOLDER_URL}${SHAREPOINT_SITE_URL}${SHAREPOINT_SITE_ID}${SHAREPOINT_SITE}${SHAREPOINT_DRIVE_ID}" ]; then
            echo "::error title=Missing SharePoint target::Configure SHAREPOINT_FOLDER_URL, SHAREPOINT_SITE_URL, SHAREPOINT_SITE_ID, SHAREPOINT_SITE, or SHAREPOINT_DRIVE_ID"
            missing=1
          fi

          exit "$missing"

      - name: Download data from API
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_USERNAME: ${{ secrets.API_USERNAME }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          OUTPUT_DIR: data
        run: python scripts/fetch_data.py

      - name: Upload to SharePoint
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SHAREPOINT_FOLDER_URL: ${{ secrets.SHAREPOINT_FOLDER_URL }}
          SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
          SHAREPOINT_SITE_ID: ${{ secrets.SHAREPOINT_SITE_ID }}
          SHAREPOINT_SITE: ${{ secrets.SHAREPOINT_SITE }}
          SHAREPOINT_DRIVE_ID: ${{ secrets.SHAREPOINT_DRIVE_ID }}
          SHAREPOINT_FOLDER: ${{ secrets.SHAREPOINT_FOLDER }}
          OUTPUT_DIR: data
        run: python scripts/upload_sharepoint.py

      - name: Upload artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: powerbi-data-${{ github.run_number }}
          path: data/*.csv
          if-no-files-found: warn
          retention-days: 7
